<script id="hapycure-home-scroll-sync">
  (() => {
    function syncPageScroll() {
      const isHomePage = Boolean(document.getElementById('page-home'));
      document.documentElement.style.overflowY = isHomePage ? 'hidden' : '';
      document.body.style.overflowY = isHomePage ? 'hidden' : '';
    }

    document.addEventListener('DOMContentLoaded', () => {
      syncPageScroll();
      const root = document.getElementById('root');
      if (root) new MutationObserver(syncPageScroll).observe(root, { childList: true, subtree: true });
    });

    window.addEventListener('popstate', syncPageScroll);
    window.addEventListener('pageshow', syncPageScroll);
  })();
</script>
<script id="hapycure-firebase-bootstrap">
  (() => {
    function bootFirebase() {
      try {
        if (window.firebase && firebase.initializeApp && window.NUTRITILIOUS_FIREBASE_CONFIG && !firebase.apps.length) {
          firebase.initializeApp(window.NUTRITILIOUS_FIREBASE_CONFIG);
        }
      } catch (error) {}
    }
    if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', bootFirebase, { once: true });
    else bootFirebase();
  })();
</script>

    /* ============ Login page logic — backend not set up yet, only Skip works for now ============ */
    function initLoginPage(navigate) {
      const phoneNumber = document.getElementById('phoneNumber');
      const continueLogin = document.getElementById('continueLogin');
      const googleLogin = document.getElementById('googleLogin');
      const loginMsg = document.getElementById('loginMsg');
      const firebaseConfig = window.NUTRITILIOUS_FIREBASE_CONFIG;
      let signInCompleted = false;
      let auth = null;

      if (!phoneNumber || !continueLogin || !googleLogin || !loginMsg) return;

      function setMsg(message, success) {
        loginMsg.style.color = success ? '#267e3e' : '#d0342c';
        loginMsg.textContent = message || '';
      }

      function setBusy(isBusy) {
        googleLogin.disabled = isBusy;
        continueLogin.disabled = isBusy;
        googleLogin.setAttribute('aria-busy', String(isBusy));
      }

      function getAuth() {
        if (!window.firebase || !firebase.auth) throw new Error('Firebase Authentication failed to load.');
        if (!firebaseConfig) throw new Error('Firebase configuration is missing.');
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        if (!auth) auth = firebase.auth();
        return auth;
      }

      function saveSignedInUser(user) {
        const userData = {
          uid: user.uid || '',
          name: user.displayName || '',
          email: user.email || '',
          phone: user.phoneNumber || '',
          photoURL: user.photoURL || '',
          isAnonymous: false,
          provider: 'google'
        };

        localStorage.setItem('nutritiliousAuthType', 'google');
        localStorage.setItem('nutritiliousUser', JSON.stringify(userData));
        localStorage.removeItem('nutritiliousLoggedOut');

        const accountId = String(userData.uid || userData.email || 'google').replace(/[^a-zA-Z0-9_-]/g, '_');
        if (userData.name) localStorage.setItem('nutritiliousProfile_' + accountId + '_Name', userData.name);
        if (userData.email) localStorage.setItem('nutritiliousProfile_' + accountId + '_Email', userData.email);
        if (userData.phone) localStorage.setItem('nutritiliousProfile_' + accountId + '_Phone', userData.phone);

        try {
          firebase.firestore().collection('users').doc(userData.uid).set({
            uid: userData.uid,
            name: userData.name,
            email: userData.email,
            phone: userData.phone,
            photoURL: userData.photoURL,
            provider: 'google',
            lastLoginAt: firebase.firestore.FieldValue.serverTimestamp()
          }, { merge: true }).catch(function () {});
        } catch (error) {}
      }

      function friendlyGoogleError(error) {
        const code = error && error.code ? error.code : '';
        if (code === 'auth/popup-closed-by-user' || code === 'auth/cancelled-popup-request') return 'Google sign-in was cancelled.';
        if (code === 'auth/popup-blocked') return 'Your browser blocked the sign-in window. Redirecting to Google sign-in…';
        if (code === 'auth/unauthorized-domain') return 'This website domain is not authorized in Firebase Authentication.';
        if (code === 'auth/network-request-failed') return 'Network error. Check your internet connection and try again.';
        if (code === 'auth/account-exists-with-different-credential') return 'An account already exists with this email using another sign-in method.';
        return error && error.message ? error.message : 'Google sign-in failed. Please try again.';
      }

      function completeGoogleSignIn(user) {
        if (signInCompleted || !user) return;
        signInCompleted = true;
        saveSignedInUser(user);
        sessionStorage.removeItem('nutritiliousGoogleRedirectPending');
        setMsg('Signed in successfully.', true);
        window.history.replaceState({ nutriView: 'home' }, '');
        navigate('home');
      }

      async function startGoogleSignIn() {
        if (googleLogin.disabled) return;
        setBusy(true);
        setMsg('Opening Google sign-in…', true);
        localStorage.removeItem('nutritiliousLoggedOut');

        try {
          const currentAuth = getAuth();
          const provider = new firebase.auth.GoogleAuthProvider();
          provider.setCustomParameters({ prompt: 'select_account' });
          const result = await currentAuth.signInWithPopup(provider);
          completeGoogleSignIn(result && result.user);
        } catch (error) {
          signInCompleted = false;
          const code = error && error.code ? error.code : '';
          if (code === 'auth/popup-blocked' || code === 'auth/operation-not-supported-in-this-environment') {
            try {
              sessionStorage.setItem('nutritiliousGoogleRedirectPending', 'true');
              setMsg('Redirecting to Google sign-in…', true);
              await getAuth().signInWithRedirect(new firebase.auth.GoogleAuthProvider());
              return;
            } catch (redirectError) {
              setMsg(friendlyGoogleError(redirectError), false);
            }
          } else {
            setMsg(friendlyGoogleError(error), false);
          }
        } finally {
          if (document.getElementById('page-login')) setBusy(false);
        }
      }

      phoneNumber.addEventListener('input', function () {
        phoneNumber.value = phoneNumber.value.replace(/[^0-9]/g, '').slice(0, 10);
        setMsg('');
      });

      phoneNumber.addEventListener('keydown', function (event) {
        if (event.key === 'Enter') event.preventDefault();
      });

      continueLogin.addEventListener('click', function () {
        const digits = phoneNumber.value.replace(/[^0-9]/g, '');
        if (digits.length !== 10) {
          setMsg('Enter a valid 10-digit mobile number.');
          phoneNumber.focus();
          return;
        }
        setMsg('Phone login is not available yet. Continue with Google.');
      });

      googleLogin.addEventListener('click', startGoogleSignIn);

      try {
        const currentAuth = getAuth();
        currentAuth.setPersistence(firebase.auth.Auth.Persistence.LOCAL).catch(function () {});
        currentAuth.getRedirectResult().then(function (result) {
          if (result && result.user) completeGoogleSignIn(result.user);
        }).catch(function (error) {
          if (sessionStorage.getItem('nutritiliousGoogleRedirectPending') === 'true') setMsg(friendlyGoogleError(error), false);
          sessionStorage.removeItem('nutritiliousGoogleRedirectPending');
        });
        currentAuth.onAuthStateChanged(function (user) {
          if (user && localStorage.getItem('nutritiliousLoggedOut') !== 'true') completeGoogleSignIn(user);
        });
      } catch (error) {
        setMsg(friendlyGoogleError(error), false);
      }
    }

    /* ============ Help & Support page logic (from original help-support.html, unchanged except navigation) ============ */
    function initHelpPage(navigate) {

    const SUPPORT_PHONE='7300748429';
    const SUPPORT_PHONE_INTERNATIONAL='917300748429';
    const FIREBASE_FALLBACK_CONFIG={projectId:'nutrilious-ceebd'};
    const backBtn=document.getElementById('backBtn');
    const supportForm=document.getElementById('supportForm');
    const submitTicketBtn=document.getElementById('submitTicketBtn');
    const issueType=document.getElementById('issueType');
    const issueSelect=document.getElementById('issueSelect');
    const issueTrigger=document.getElementById('issueTrigger');
    const issueTriggerText=document.getElementById('issueTriggerText');
    const issueItems=document.querySelectorAll('.issue-item');
    const orderId=document.getElementById('orderId');
    const issueDetails=document.getElementById('issueDetails');
    const ticketMsg=document.getElementById('ticketMsg');
    const callSupport=document.getElementById('callSupport');
    const whatsappSupport=document.getElementById('whatsappSupport');
    const emailSupport=document.getElementById('emailSupport');
    let db=null;

    function initFirebase(){
      if(db)return true;
      if(!window.firebase)return false;
      const config=window.NUTRITILIOUS_FIREBASE_CONFIG||FIREBASE_FALLBACK_CONFIG;
      if(!firebase.apps.length)firebase.initializeApp(config);
      db=firebase.firestore();
      return true;
    }

    function getLocalUser(){
      try{return JSON.parse(localStorage.getItem('nutritiliousUser')||'{}')||{}}
      catch(error){return{}}
    }

    backBtn.onclick=()=>{navigate('home')};

    function setIssue(value){
      issueType.value=value;
      const selected=[...issueItems].find(item=>item.dataset.issue===value);
      issueItems.forEach(item=>item.classList.toggle('active',item.dataset.issue===value));
      if(selected){issueTriggerText.textContent=selected.querySelector('span').textContent;issueTrigger.classList.add('selected')}
      else{issueTriggerText.textContent='Select issue type';issueTrigger.classList.remove('selected')}
    }

    issueTrigger.onclick=event=>{event.stopPropagation();issueSelect.classList.toggle('open')};
    issueItems.forEach(item=>{item.onclick=()=>{setIssue(item.dataset.issue||'');issueSelect.classList.remove('open')}});
    document.onclick=event=>{if(!issueSelect.contains(event.target))issueSelect.classList.remove('open')};
    document.querySelectorAll('.faq-question').forEach(button=>{button.onclick=()=>{const item=button.closest('.faq-item');const open=item.classList.contains('open');document.querySelectorAll('.faq-item').forEach(faq=>{faq.classList.remove('open');faq.querySelector('.faq-plus').textContent='+'});if(!open){item.classList.add('open');item.querySelector('.faq-plus').textContent='−'}}});

    supportForm.onsubmit=async event=>{
      event.preventDefault();
      const type=issueType.value.trim();
      const details=issueDetails.value.trim();
      const orderValue=orderId.value.trim();
      if(!type){ticketMsg.style.color='#d0342c';ticketMsg.textContent='Please select issue type.';return}
      if(details.length<15){ticketMsg.style.color='#d0342c';ticketMsg.textContent='Please describe the issue.';return}
      if(!initFirebase()){ticketMsg.style.color='#d0342c';ticketMsg.textContent='Firebase failed to load. Please try again.';return}
      let ticketSubmitted=false;
      submitTicketBtn.disabled=true;
      submitTicketBtn.textContent='Submitting Ticket...';
      ticketMsg.textContent='';
      try{
        const ticketId='NUT-'+Date.now().toString().slice(-6);
        const localUser=getLocalUser();
        const ticket={ticketId,issueType:type,orderId:orderValue,details,status:'pending',source:'help-support-page',userId:localUser.uid||'',userPhone:localUser.phone||'',userEmail:localUser.email||'',createdAt:firebase.firestore.FieldValue.serverTimestamp(),localCreatedAt:new Date().toISOString()};
        const saveTicket=db.collection('supportTickets').doc(ticketId).set(ticket);
        const timeout=new Promise((_,reject)=>setTimeout(()=>reject(new Error('timeout')),8000));
        await Promise.race([saveTicket,timeout]);
        const oldTickets=JSON.parse(localStorage.getItem('nutritiliousSupportTickets')||'[]');
        oldTickets.unshift({...ticket,createdAt:ticket.localCreatedAt});
        localStorage.setItem('nutritiliousSupportTickets',JSON.stringify(oldTickets));
        ticketSubmitted=true;
        submitTicketBtn.textContent='Submitted';
        ticketMsg.style.color='#267e3e';
        ticketMsg.textContent=`Ticket submitted successfully. Your Ticket ID is ${ticketId}.`;
        supportForm.reset();
        setIssue('');
      }catch(error){
        submitTicketBtn.textContent='Submit Ticket';
        ticketMsg.style.color='#d0342c';
        ticketMsg.textContent='Ticket not submitted. Please try again.';
      }finally{
        if(ticketSubmitted){setTimeout(()=>{submitTicketBtn.disabled=false;submitTicketBtn.textContent='Submit Ticket'},1400)}
        else submitTicketBtn.disabled=false;
      }
    };

    callSupport.onclick=()=>{window.location.href=`tel:+91${SUPPORT_PHONE}`};
    whatsappSupport.onclick=()=>{const message=encodeURIComponent('Hi Nutritilious Support, I need help with my order.');window.location.href=`https://wa.me/${SUPPORT_PHONE_INTERNATIONAL}?text=${message}`};
    emailSupport.onclick=()=>{const subject=encodeURIComponent('Nutritilious Support Request');const body=encodeURIComponent('Hi Nutritilious Support,\n\nI need help with:\n\n');window.location.href=`mailto:support@nutritilious.com?subject=${subject}&body=${body}`};
    initFirebase();
  
    }

    function HomePage({ navigate }) {
      useEffect(() => {
        initHomePage(navigate);
      }, []);
      return <div id="page-home" dangerouslySetInnerHTML={{ __html: HOME_HTML }} />;
    }

    function LoginPage({ navigate }) {
      useEffect(() => {
        document.body.style.overflowY = 'hidden';
        initLoginPage(navigate);
        return () => { document.body.style.overflowY = ''; };
      }, []);
      return <div id="page-login" dangerouslySetInnerHTML={{ __html: LOGIN_HTML }} />;
    }

    function HelpPage({ navigate }) {
      useEffect(() => {
        initHelpPage(navigate);
        return () => { document.onclick = null; };
      }, []);
      return <div id="page-help" dangerouslySetInnerHTML={{ __html: HELP_HTML }} />;
    }

    function App() {
      const getInitialView = () => {
        try {
          const user = JSON.parse(localStorage.getItem('nutritiliousUser') || '{}') || {};
          const isGoogleUser = localStorage.getItem('nutritiliousAuthType') === 'google' && Boolean(user.uid || user.email);
          const explicitlyLoggedOut = localStorage.getItem('nutritiliousLoggedOut') === 'true';
          return isGoogleUser && !explicitlyLoggedOut ? 'home' : 'login';
        } catch (error) {
          return 'login';
        }
      };

      const [view, setView] = useState(getInitialView);

      useEffect(() => {
        const initialView = getInitialView();
        window.history.replaceState({ nutriView: initialView }, '');
        if (initialView !== view) setView(initialView);

        const onPopState = (event) => {
          const requestedView = event.state && event.state.nutriView ? event.state.nutriView : getInitialView();
          const safeView = requestedView === 'login' && getInitialView() === 'home' ? 'home' : requestedView;
          setView(safeView);
        };

        window.addEventListener('popstate', onPopState);
        return () => window.removeEventListener('popstate', onPopState);
      }, []);

      const navigate = (next) => {
        setView(next);
        if (next === 'home') window.history.replaceState({ nutriView: 'home' }, '');
        else window.history.pushState({ nutriView: next }, '');
      };

      if (view === 'help') return <HelpPage navigate={navigate} />;
      if (view === 'home') return <HomePage navigate={navigate} />;
      return <LoginPage navigate={navigate} />;
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
